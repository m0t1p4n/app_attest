name: app_attest
description: "Flutter plugin for Apple App Attest on iOS and Play Integrity on Android."
version: 0.0.1

homepage: https://github.com/m0t1p4n/app_attest
repository: https://github.com/m0t1p4n/app_attest
issue_tracker: https://github.com/m0t1p4n/app_attest/issues

topics:
  - app_integrity
  - device_check
  - security
  - app_attest

environment:
  sdk: ^3.11.5
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.motsipan
        pluginClass: AppAttestPlugin
      ios:
        pluginClass: AppAttestPlugin
